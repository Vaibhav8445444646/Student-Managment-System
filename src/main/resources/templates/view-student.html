<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head}" ></head>

<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
       <div th:replace="~{fragments/layout :: sidebar}"></div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <div th:replace="~{fragments/layout :: navbar}"></div>

            <div class="container-fluid px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Student Details</h2>
                    <a th:href="@{/students/list}" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i> Back to
                        List</a>
                </div>

                <div class="row">
                    <!-- Left Column: Student Information -->
                    <div class="col-md-8">
                        <div class="card mb-4">
                            <div class="card-header bg-white">
                                <i class="bi bi-person-lines-fill me-1"></i> Information
                            </div>
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-3 fw-bold">Full Name:</div>
                                    <div class="col-md-9" th:text="|${student.firstName} ${student.lastName}|"></div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-3 fw-bold">Email Address:</div>
                                    <div class="col-md-9" th:text="${student.email}"></div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-3 fw-bold">Phone Number:</div>
                                    <div class="col-md-9" th:text="${student.phoneNumber}">+1 234 567 8900</div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-3 fw-bold">Is Active:</div>
                                    <div class="col-md-9"  th:text="${student.active} ? 'Yes' : 'No'"></div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-3 fw-bold">Address:</div>
                                    <div class="col-md-9" th:text="${student.address}"></div>
                                </div>
                            </div>
                            <div class="card-footer bg-white">
                                <a th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-warning text-white"><i class="bi bi-pencil me-1"></i>
                                    Edit Student</a>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Enrolled Courses -->
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header bg-white">
                                <i class="bi bi-book me-1"></i> Enrolled Courses
                            </div>
                            <div class="card-body">
                                <div th:if="${enrollmentDetails != null and enrollmentDetails.courseList != null and !#lists.isEmpty(enrollmentDetails.courseList)}">
                                    <div class="mb-3">
                                        <strong>Total Courses:</strong> <span class="badge bg-primary" th:text="${enrollmentDetails.courseCount}">0</span>
                                    </div>
                                    <div class="mb-3">
                                        <strong>Total Fee:</strong> <span class="text-success fw-bold" th:text="${'Rs.' + #numbers.formatDecimal(enrollmentDetails.totalFee, 1, 'COMMA', 2, 'POINT')}">Rs.0.00</span>
                                    </div>
                                    <hr>
                                    <div class="course-list">
                                        <div th:each="course : ${enrollmentDetails.courseList}" class="mb-2 p-2 border rounded">
                                            <div class="fw-bold text-primary" th:text="${course.courseName}">Course Name</div>
                                            <div class="small text-muted" th:text="${course.description}">Course Description</div>
                                            <div class="mt-1">
                                                <span class="badge bg-info">Rs. <span th:text="${#numbers.formatDecimal(course.fee, 1, 'COMMA', 2, 'POINT')}">0.00</span></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div th:if="${enrollmentDetails == null or enrollmentDetails.courseList == null or #lists.isEmpty(enrollmentDetails.courseList)}" class="text-center text-muted">
                                    <i class="bi bi-book display-4"></i>
                                    <p class="mt-2">No courses enrolled yet</p>
                                    <a th:href="@{/enrollments/showEnroll}" class="btn btn-sm btn-primary">Enroll in Courses</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
   <div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
